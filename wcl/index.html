<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 关键：移动端视口适配，禁止缩放 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="Keywords" content="">
    <meta name="Description" content="">
    <title>老婆别生气了嘛，不讨厌不讨厌</title>
	<style type="text/css">
		*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color: transparent;}
		body{
			background:#222;
			perspective:800px;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
		}
		#wrap{
			position:relative;
			width:120px;
			height:180px;
			margin:auto;
			transform-style:preserve-3d;
            -webkit-transform-style: preserve-3d;
		}
		#wrap img{
			position:absolute;
			width:133px;
			height:200px;
			box-shadow:0 0 10px #000;
			-webkit-box-reflect:below 5px -webkit-linear-gradient(top,rgba(0,0,0,0) 40%,rgba(0,0,0,.5) 100%);
			border-radius:5px;
            pointer-events: none;
            -webkit-user-select: none;
		}
		#wrap p{
			position:absolute;
			left:50%;
			top:112%;
			margin-left:-600px;
			margin-top:-600px;
			width:1200px;
			height:1200px;
			border-radius:50%;
			background:-webkit-radial-gradient(center center,600px 600px,rgba(122,122,122,0.2),rgba(0,0,0,0));
			transform:rotateX(90deg);
            -webkit-transform: rotateX(90deg);
		}
        /* 修复文字居中：放到body下全局居中，脱离3D容器干扰 */
        .center-text {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            -webkit-transform: translate(-50%, -50%);
            color: #fff;
            font-size: 26px;
            font-weight: bold;
            text-align: center;
            white-space: nowrap;
            z-index: 9999;
            text-shadow: 0 0 8px #ff6699, 0 0 12px #000;
            pointer-events: none;
        }
	</style>
</head>
<body>
    <!-- 文字移出#wrap，放到body直接子元素，不受3D旋转影响 -->
    <div class="center-text">老婆我错了<br>别生气了嘛<br>最喜欢你了</div>

	<div id="wrap">
		<img src="images/1.png" alt="" />
		<img src="images/2.jpg" alt="" />
		<img src="images/3.jpeg" alt="" />
		<img src="images/4.jpeg" alt="" />
		<img src="images/5.jpg" alt="" />
		<img src="images/6.jpeg" alt="" />
		<img src="images/7.jpg" alt="" />
		<img src="images/8.png" alt="" />
		<img src="images/9.jpeg" alt="" />
		<img src="images/10.jpeg" alt="" />
		<img src="images/11.jpeg" alt="" />
		<img src="images/12.jpeg" alt="" />
		<p></p>
	</div>
	<script type="text/javascript">
		var oWrap = document.getElementById("wrap");
		var aImg = oWrap.getElementsByTagName("img");

		// 垂直居中 兼容移动端vh
		function mTop(){
			var H = window.innerHeight || document.documentElement.clientHeight;
			oWrap.style.marginTop = (H/2 - 180) + "px"
		}
		mTop();
		window.onresize = mTop;

		// 图片环形3D布局
		var len = aImg.length;
		var Deg = 360/len;
		for (var i=0;i<len;i++ )
		{
			aImg[i].style.transform = "rotateY("+i*Deg+"deg) translateZ(350px)";
			aImg[i].style.webkitTransform = "rotateY("+i*Deg+"deg) translateZ(350px)";
			aImg[i].style.transition = "1s "+(len-1-i)*0.1+"s";
		}

		// 公共旋转变量
		var lastX,lastY,nowX,nowY,minX=0,minY=0,roX=0,roY=0,timer;

        // ========== 兼容PC鼠标 + 手机触摸 ==========
        // 统一获取坐标函数
        function getPos(e){
            if(e.touches && e.touches.length>0){
                return {x:e.touches[0].clientX, y:e.touches[0].clientY}
            }else{
                return {x:e.clientX, y:e.clientY}
            }
        }

        // 按下/触摸开始
        function start(e){
            // 仅触摸才阻止默认，鼠标不阻止，修复电脑鼠标失效
            if(e.touches) e.preventDefault();
            clearInterval(timer);
            var pos = getPos(e);
            lastX = pos.x;
            lastY = pos.y;
            minX = 0;
            minY = 0;
        }
        // 移动
        function move(e){
            // 仅触摸才阻止默认，鼠标不阻止
            if(e.touches) e.preventDefault();
            var pos = getPos(e);
            nowX = pos.x;
            nowY = pos.y;
            minX = nowX - lastX;
            minY = nowY - lastY;
            roY += minX*0.2;
            roX -= minY*0.2;
            oWrap.style.transform = "rotateX("+roX+"deg) rotateY("+roY+"deg)";
            oWrap.style.webkitTransform = "rotateX("+roX+"deg) rotateY("+roY+"deg)";
            lastX = nowX;
            lastY = nowY;
        }
        // 抬起/触摸结束 惯性滑动
        function end(){
            timer = setInterval(function(){
                minX *=0.95;
                minY *=0.95;
                roY += minX*0.2;
                roX -= minY*0.2;
                oWrap.style.transform = "rotateX("+roX+"deg) rotateY("+roY+"deg)";
                oWrap.style.webkitTransform = "rotateX("+roX+"deg) rotateY("+roY+"deg)";
                if (Math.abs(minX)<0.1 && Math.abs(minY)<0.1)
                {
                    clearInterval(timer);
                }
            },1000/60);
        }

        // PC鼠标事件
		document.onmousedown = start;
        document.onmousemove = move;
        document.onmouseup = end;

        // 手机触摸事件
        document.addEventListener('touchstart', start, {passive:false});
        document.addEventListener('touchmove', move, {passive:false});
        document.addEventListener('touchend', end);
        document.addEventListener('touchcancel', end);
	</script>
</body>
</html>
